name: ci
on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go build ./...

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        # 1.7.12, pinned by digest
        run: |
          docker run --rm -v "$PWD:/repo" --workdir /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  readonly-guarantee:
    runs-on: ubuntu-latest
    env:
      OMNI_IMAGE: us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta.2@sha256:115622065afefd267f9ef3ff1025e35d73a03f66a7335de8e051b393ebdcfacc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go build -o spanner-ro .
      - name: Start Spanner Omni
        run: |
          docker run -d --name spanner-omni -p 15000-15026:15000-15026 \
            "$OMNI_IMAGE" start-single-server
          for _ in $(seq 1 60); do
            if docker logs spanner-omni 2>&1 | grep -q "Spanner is ready"; then
              echo "Spanner Omni is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Spanner Omni did not become ready" >&2
          docker logs spanner-omni >&2
          exit 1
      - name: Verify UPDATE/DELETE cannot be executed
        run: ./scripts/verify-readonly.sh

  test:
    runs-on: ubuntu-latest
    env:
      OMNI_IMAGE: us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta.2@sha256:115622065afefd267f9ef3ff1025e35d73a03f66a7335de8e051b393ebdcfacc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - name: Start Spanner Omni
        run: |
          docker run -d --name spanner-omni -p 15000-15026:15000-15026 \
            "$OMNI_IMAGE" start-single-server
          for _ in $(seq 1 60); do
            if docker logs spanner-omni 2>&1 | grep -q "Spanner is ready"; then
              echo "Spanner Omni is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Spanner Omni did not become ready" >&2
          docker logs spanner-omni >&2
          exit 1
      - name: Run tests (unit + E2E)
        run: go test -v ./...
        env:
          SPANNER_ENDPOINT: localhost:15000
